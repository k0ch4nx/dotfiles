# yaml-language-server: $schema=https://schemastore.org/github-workflow.json

name: Update flake.lock

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:

concurrency:
  group: flake-update
  cancel-in-progress: false

jobs:
  check:
    name: Check for an existing update
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      proceed: ${{ steps.pull-request.outputs.proceed }}

    steps:
      - name: Check for an open flake update pull request
        id: pull-request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          open_pr_number="$(
            gh pr list \
              --repo "${GITHUB_REPOSITORY}" \
              --state open \
              --base main \
              --head automation/flake-update \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [[ -n "${open_pr_number}" ]]; then
            printf 'An update pull request is already open: #%s\n' "${open_pr_number}"
            printf 'proceed=false\n' >>"${GITHUB_OUTPUT}"
          else
            printf 'proceed=true\n' >>"${GITHUB_OUTPUT}"
          fi

  update:
    name: Validate and publish an update
    needs: check
    if: needs.check.outputs.proceed == 'true'
    runs-on: macos-26
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: main

      - name: Configure the R2 cache
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          R2_CACHE_BUCKET: ${{ vars.R2_CACHE_BUCKET }}
          NIX_CACHE_LOCAL_PUBLIC_KEY: ${{ vars.NIX_CACHE_LOCAL_PUBLIC_KEY }}
          NIX_CACHE_CI_PUBLIC_KEY: ${{ vars.NIX_CACHE_CI_PUBLIC_KEY }}
        run: ./scripts/configure-r2-cache.sh

      - name: Install Nix and verify the current configuration
        run: |
          source ./scripts/bootstrap.sh
          dirname "$(command -v nix)" >>"${GITHUB_PATH}"

      - name: Update flake.lock
        id: update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix --option access-tokens "github.com=${GH_TOKEN}" flake update

          if git diff --quiet -- flake.lock; then
            echo 'changed=false' >>"${GITHUB_OUTPUT}"
          else
            echo 'changed=true' >>"${GITHUB_OUTPUT}"
          fi

      - name: Check the updated flake
        if: steps.update.outputs.changed == 'true'
        run: nix flake check --impure --no-update-lock-file

      - name: Prepare the CI signing key
        if: steps.update.outputs.changed == 'true'
        env:
          NIX_CACHE_PRIVATE_KEY: ${{ secrets.NIX_CACHE_CI_PRIVATE_KEY }}
        run: |
          private_key="${RUNNER_TEMP}/nix-cache-ci-private-key"

          umask 077
          printf '%s\n' "${NIX_CACHE_PRIVATE_KEY}" >"${private_key}"
          printf 'NIX_CACHE_PRIVATE_KEY_FILE=%s\n' "${private_key}" >>"${GITHUB_ENV}"

      - name: Build, sign, and upload the updated Darwin closure
        if: steps.update.outputs.changed == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          R2_CACHE_BUCKET: ${{ vars.R2_CACHE_BUCKET }}
          DOTFILES_DIR: ${{ github.workspace }}
        run: nix run path:.#cache-push

      - name: Create the pull request
        id: create-pull-request
        if: steps.update.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.FLAKE_UPDATE_TOKEN }}
          branch-token: ${{ secrets.GITHUB_TOKEN }}
          sign-commits: true
          branch: automation/flake-update
          base: main
          delete-branch: true
          add-paths: flake.lock
          commit-message: "chore: update flake.lock"
          title: "chore: update flake.lock"
          body: |
            Automated hourly flake input update.

            The updated flake and Darwin closure were built successfully,
            and the signed closure was uploaded to the private R2 cache
            before this pull request was created.

      - name: Enable auto-merge
        if: steps.create-pull-request.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.FLAKE_UPDATE_TOKEN }}
          PR_NUMBER: ${{ steps.create-pull-request.outputs.pull-request-number }}
        run: gh pr merge --repo "${GITHUB_REPOSITORY}" --merge --auto "${PR_NUMBER}"
