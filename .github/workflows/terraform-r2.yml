name: Terraform R2

on:
  pull_request:
    paths:
      - "infra/r2/**"
      - ".github/workflows/terraform-r2.yml"
  push:
    branches:
      - main
    paths:
      - "infra/r2/**"
      - ".github/workflows/terraform-r2.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-r2
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TERRAFORM_VERSION: "1.15.8"

jobs:
  static-check:
    name: Static check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: infra/r2
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
      - name: Check formatting
        run: terraform fmt -check -recursive
      - name: Initialize providers without the HCP Terraform backend
        run: terraform init -backend=false -input=false -lockfile=readonly
      - name: Validate configuration
        run: terraform validate -no-color

  plan:
    name: Plan
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: infra/r2
    env:
      TF_CLOUD_ORGANIZATION: ${{ vars.TF_CLOUD_ORGANIZATION }}
      TF_WORKSPACE: ${{ vars.TF_WORKSPACE }}
      TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_bucket_name: ${{ vars.R2_CACHE_BUCKET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Require the main branch
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Terraform plan and apply must run from the main branch."
          exit 1
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      - name: Initialize Terraform
        run: terraform init -input=false -lockfile=readonly
      - name: Check formatting
        run: terraform fmt -check -recursive
      - name: Validate configuration
        run: terraform validate -no-color
      - name: Create plan
        run: terraform plan -input=false -no-color -out=tfplan
      - name: Add plan to workflow summary
        run: |
          terraform show -no-color tfplan > tfplan.txt
          {
            echo "## Terraform R2 plan"
            echo
            echo '```text'
            cat tfplan.txt
            echo '```'
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Upload plan
        uses: actions/upload-artifact@v7
        with:
          name: terraform-r2-plan
          path: infra/r2/tfplan
          if-no-files-found: error
          retention-days: 7

  apply:
    name: Apply
    needs: plan
    runs-on: ubuntu-24.04
    environment:
      name: terraform-r2
    defaults:
      run:
        working-directory: infra/r2
    env:
      TF_CLOUD_ORGANIZATION: ${{ vars.TF_CLOUD_ORGANIZATION }}
      TF_WORKSPACE: ${{ vars.TF_WORKSPACE }}
      TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_bucket_name: ${{ vars.R2_CACHE_BUCKET }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}
      - name: Initialize Terraform
        run: terraform init -input=false -lockfile=readonly
      - name: Download saved plan
        uses: actions/download-artifact@v8
        with:
          name: terraform-r2-plan
          path: infra/r2
      - name: Apply saved plan
        run: terraform apply -input=false tfplan
