# yaml-language-server: $schema=https://schemastore.org/github-workflow.json

name: Auto-merge flake.lock update

on:
  workflow_run:
    workflows:
      - Build
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    name: Merge the validated update
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.head_branch == 'automation/flake-update'
    runs-on: ubuntu-24.04

    steps:
      - name: Verify and merge the pull request
        uses: actions/github-script@v8
        with:
          script: |
            const run = context.payload.workflow_run;
            const pullRequest = run.pull_requests[0];

            if (!pullRequest) {
              core.setFailed("The successful Build run is not linked to a pull request.");
              return;
            }

            const { data: pr } = await github.rest.pulls.get({
              ...context.repo,
              pull_number: pullRequest.number,
            });

            const expectedRepository = `${context.repo.owner}/${context.repo.repo}`;
            const validPullRequest =
              pr.state === "open" &&
              pr.base.ref === "main" &&
              pr.head.ref === "automation/flake-update" &&
              pr.head.repo?.full_name === expectedRepository &&
              pr.head.sha === run.head_sha;

            if (!validPullRequest) {
              core.setFailed("The pull request no longer matches the validated flake update.");
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              ...context.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            if (files.length !== 1 || files[0].filename !== "flake.lock") {
              core.setFailed("The pull request changes files other than flake.lock.");
              return;
            }

            const { data: result } = await github.rest.pulls.merge({
              ...context.repo,
              pull_number: pr.number,
              merge_method: "merge",
              sha: run.head_sha,
            });

            if (!result.merged) {
              core.setFailed(result.message);
            }
