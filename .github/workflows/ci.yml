name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-pr:
    name: macOS
    if: github.event_name == 'pull_request'
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Configure the R2 read cache when credentials are available
        env:
          R2_READ_ACCESS_KEY_ID: ${{ secrets.R2_CI_READ_ACCESS_KEY_ID }}
          R2_READ_SECRET_ACCESS_KEY: ${{ secrets.R2_CI_READ_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          R2_CACHE_BUCKET: ${{ vars.R2_CACHE_BUCKET }}
          NIX_CACHE_LOCAL_PUBLIC_KEY: ${{ vars.NIX_CACHE_LOCAL_PUBLIC_KEY }}
          NIX_CACHE_CI_PUBLIC_KEY: ${{ vars.NIX_CACHE_CI_PUBLIC_KEY }}
        run: |
          if [[ -z "${R2_READ_ACCESS_KEY_ID}" || -z "${R2_READ_SECRET_ACCESS_KEY}" || -z "${CLOUDFLARE_ACCOUNT_ID}" || -z "${NIX_CACHE_LOCAL_PUBLIC_KEY}" || -z "${NIX_CACHE_CI_PUBLIC_KEY}" ]]; then
            echo "R2 read credentials or public settings are unavailable; cache.nixos.org will be used."
            exit 0
          fi

          credentials="${RUNNER_TEMP}/r2-read-credentials"
          umask 077
          printf '[nix-r2-read]\naws_access_key_id = %s\naws_secret_access_key = %s\n' \
            "${R2_READ_ACCESS_KEY_ID}" \
            "${R2_READ_SECRET_ACCESS_KEY}" >"${credentials}"
          sudo install -d -m 700 /var/root/.aws
          sudo install -m 600 "${credentials}" /var/root/.aws/credentials

          cache="s3://${R2_CACHE_BUCKET:-dotfiles-nix-cache}?endpoint=${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com&scheme=https&region=auto&profile=nix-r2-read"
          {
            echo 'NIX_CONFIG<<EOF'
            printf '%s\n' "${NIX_CONFIG:-}"
            printf 'extra-substituters = %s\n' "${cache}"
            printf 'extra-trusted-public-keys = %s %s\n' "${NIX_CACHE_LOCAL_PUBLIC_KEY}" "${NIX_CACHE_CI_PUBLIC_KEY}"
            echo 'fallback = true'
            echo 'EOF'
          } >>"${GITHUB_ENV}"
      - name: Build the Darwin configuration
        run: ./scripts/bootstrap.sh
      - name: Check all flake outputs
        run: nix flake check --impure --no-update-lock-file

  macos-publish:
    name: macOS and cache upload
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    runs-on: macos-26
    environment:
      name: nix-cache-write
    steps:
      - uses: actions/checkout@v7
      - name: Configure the R2 read cache
        env:
          R2_READ_ACCESS_KEY_ID: ${{ secrets.R2_CI_READ_ACCESS_KEY_ID }}
          R2_READ_SECRET_ACCESS_KEY: ${{ secrets.R2_CI_READ_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          R2_CACHE_BUCKET: ${{ vars.R2_CACHE_BUCKET }}
          NIX_CACHE_LOCAL_PUBLIC_KEY: ${{ vars.NIX_CACHE_LOCAL_PUBLIC_KEY }}
          NIX_CACHE_CI_PUBLIC_KEY: ${{ vars.NIX_CACHE_CI_PUBLIC_KEY }}
        run: |
          : "${R2_READ_ACCESS_KEY_ID:?R2_CI_READ_ACCESS_KEY_ID is required}"
          : "${R2_READ_SECRET_ACCESS_KEY:?R2_CI_READ_SECRET_ACCESS_KEY is required}"
          : "${CLOUDFLARE_ACCOUNT_ID:?CLOUDFLARE_ACCOUNT_ID is required}"
          : "${NIX_CACHE_LOCAL_PUBLIC_KEY:?NIX_CACHE_LOCAL_PUBLIC_KEY is required}"
          : "${NIX_CACHE_CI_PUBLIC_KEY:?NIX_CACHE_CI_PUBLIC_KEY is required}"

          credentials="${RUNNER_TEMP}/r2-read-credentials"
          umask 077
          printf '[nix-r2-read]\naws_access_key_id = %s\naws_secret_access_key = %s\n' \
            "${R2_READ_ACCESS_KEY_ID}" \
            "${R2_READ_SECRET_ACCESS_KEY}" >"${credentials}"
          sudo install -d -m 700 /var/root/.aws
          sudo install -m 600 "${credentials}" /var/root/.aws/credentials

          cache="s3://${R2_CACHE_BUCKET:-dotfiles-nix-cache}?endpoint=${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com&scheme=https&region=auto&profile=nix-r2-read"
          {
            echo 'NIX_CONFIG<<EOF'
            printf '%s\n' "${NIX_CONFIG:-}"
            printf 'extra-substituters = %s\n' "${cache}"
            printf 'extra-trusted-public-keys = %s %s\n' "${NIX_CACHE_LOCAL_PUBLIC_KEY}" "${NIX_CACHE_CI_PUBLIC_KEY}"
            echo 'fallback = true'
            echo 'EOF'
          } >>"${GITHUB_ENV}"
      - name: Build the Darwin configuration
        run: ./scripts/bootstrap.sh
      - name: Check all flake outputs
        run: nix flake check --impure --no-update-lock-file
      - name: Prepare R2 write credentials and signing key
        env:
          R2_WRITE_ACCESS_KEY_ID: ${{ secrets.R2_CI_WRITE_ACCESS_KEY_ID }}
          R2_WRITE_SECRET_ACCESS_KEY: ${{ secrets.R2_CI_WRITE_SECRET_ACCESS_KEY }}
          NIX_CACHE_PRIVATE_KEY: ${{ secrets.NIX_CACHE_CI_PRIVATE_KEY }}
        run: |
          : "${R2_WRITE_ACCESS_KEY_ID:?R2_CI_WRITE_ACCESS_KEY_ID is required}"
          : "${R2_WRITE_SECRET_ACCESS_KEY:?R2_CI_WRITE_SECRET_ACCESS_KEY is required}"
          : "${NIX_CACHE_PRIVATE_KEY:?NIX_CACHE_CI_PRIVATE_KEY is required}"

          credentials="${RUNNER_TEMP}/r2-write-credentials"
          private_key="${RUNNER_TEMP}/nix-cache-ci-private-key"
          umask 077
          printf '[nix-r2-write]\naws_access_key_id = %s\naws_secret_access_key = %s\n' \
            "${R2_WRITE_ACCESS_KEY_ID}" \
            "${R2_WRITE_SECRET_ACCESS_KEY}" >"${credentials}"
          printf '%s\n' "${NIX_CACHE_PRIVATE_KEY}" >"${private_key}"
          printf 'R2_WRITE_CREDENTIALS_FILE=%s\n' "${credentials}" >>"${GITHUB_ENV}"
          printf 'NIX_CACHE_PRIVATE_KEY_FILE=%s\n' "${private_key}" >>"${GITHUB_ENV}"
      - name: Sign and upload the Darwin closure
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          R2_CACHE_BUCKET: ${{ vars.R2_CACHE_BUCKET }}
          DOTFILES_DIR: ${{ github.workspace }}
        run: nix run path:.#cache-push

  wsl:
    name: WSL
    runs-on: windows-2025
    steps:
      - name: Install Ubuntu on WSL
        uses: Ubuntu/WSL/.github/actions/wsl-install@main
        with:
          distro: Ubuntu-24.04
      - name: Check out repository in WSL
        uses: Ubuntu/WSL/.github/actions/wsl-checkout@main
        with:
          distro: Ubuntu-24.04
          working-dir: /tmp/dotfiles
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build the WSL configuration
        uses: Ubuntu/WSL/.github/actions/wsl-bash@main
        env:
          R2_READ_ACCESS_KEY_ID: ${{ secrets.R2_CI_READ_ACCESS_KEY_ID }}
          R2_READ_SECRET_ACCESS_KEY: ${{ secrets.R2_CI_READ_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          R2_CACHE_BUCKET: ${{ vars.R2_CACHE_BUCKET }}
          NIX_CACHE_LOCAL_PUBLIC_KEY: ${{ vars.NIX_CACHE_LOCAL_PUBLIC_KEY }}
          NIX_CACHE_CI_PUBLIC_KEY: ${{ vars.NIX_CACHE_CI_PUBLIC_KEY }}
          WSLENV: R2_READ_ACCESS_KEY_ID/u:R2_READ_SECRET_ACCESS_KEY/u:CLOUDFLARE_ACCOUNT_ID/u:R2_CACHE_BUCKET/u:NIX_CACHE_LOCAL_PUBLIC_KEY/u:NIX_CACHE_CI_PUBLIC_KEY/u
        with:
          distro: Ubuntu-24.04
          working-dir: /tmp/dotfiles
          exec: |
            git remote set-url origin "https://github.com/${{ github.repository }}.git"

            if [[ -n "${R2_READ_ACCESS_KEY_ID:-}" && -n "${R2_READ_SECRET_ACCESS_KEY:-}" && -n "${CLOUDFLARE_ACCOUNT_ID:-}" && -n "${NIX_CACHE_LOCAL_PUBLIC_KEY:-}" && -n "${NIX_CACHE_CI_PUBLIC_KEY:-}" ]]; then
              credentials="$(mktemp)"
              trap 'rm -f "${credentials}"' EXIT
              chmod 600 "${credentials}"
              printf '[nix-r2-read]\naws_access_key_id = %s\naws_secret_access_key = %s\n' \
                "${R2_READ_ACCESS_KEY_ID}" \
                "${R2_READ_SECRET_ACCESS_KEY}" >"${credentials}"
              sudo install -d -m 700 /root/.aws
              sudo install -m 600 "${credentials}" /root/.aws/credentials

              cache="s3://${R2_CACHE_BUCKET:-dotfiles-nix-cache}?endpoint=${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com&scheme=https&region=auto&profile=nix-r2-read"
              NIX_CONFIG="${NIX_CONFIG:-}"$'\n'"extra-substituters = ${cache}"$'\n'"extra-trusted-public-keys = ${NIX_CACHE_LOCAL_PUBLIC_KEY} ${NIX_CACHE_CI_PUBLIC_KEY}"$'\n'"fallback = true"
              export NIX_CONFIG
            else
              echo "R2 read credentials or public settings are unavailable; cache.nixos.org will be used."
            fi

            GITHUB_ACTIONS=true ./scripts/bootstrap.sh
            nix flake check --impure --no-update-lock-file
