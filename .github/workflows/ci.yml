name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS
    runs-on: macos-26
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Build the Darwin configuration
        env:
          CI: "1"
        run: |
          bash -n bootstrap/*.sh
          bash bootstrap/darwin.sh
          bash bootstrap/darwin.sh
          git diff --exit-code -- flake.lock

  wsl:
    name: WSL
    runs-on: windows-2025
    timeout-minutes: 120
    steps:
      - name: Install Ubuntu on WSL
        uses: Ubuntu/WSL/.github/actions/wsl-install@f861f1083e518354e4c3637b08c0edfcf8bc3d51
        with:
          distro: Ubuntu-24.04
      - name: Check out repository in WSL
        uses: Ubuntu/WSL/.github/actions/wsl-checkout@f861f1083e518354e4c3637b08c0edfcf8bc3d51
        with:
          distro: Ubuntu-24.04
          working-dir: /tmp/dotfiles
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build the WSL configuration
        uses: Ubuntu/WSL/.github/actions/wsl-bash@f861f1083e518354e4c3637b08c0edfcf8bc3d51
        with:
          distro: Ubuntu-24.04
          working-dir: /tmp/dotfiles
          exec: |
            git remote set-url origin https://github.com/${{ github.repository }}.git
            bash -n bootstrap/*.sh
            CI=1 bash bootstrap/wsl.sh
            CI=1 bash bootstrap/wsl.sh
            git diff --exit-code -- flake.lock
