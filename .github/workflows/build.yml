# yaml-language-server: $schema=https://schemastore.org/github-workflow.json

name: Build

on:
  pull_request:

  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  darwin:
    name: macOS
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure the R2 cache
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          R2_CACHE_BUCKET: ${{ vars.R2_CACHE_BUCKET }}
          NIX_CACHE_LOCAL_PUBLIC_KEY: ${{ vars.NIX_CACHE_LOCAL_PUBLIC_KEY }}
          NIX_CACHE_CI_PUBLIC_KEY: ${{ vars.NIX_CACHE_CI_PUBLIC_KEY }}
        run: ./scripts/configure-r2-cache.sh

      - name: Build the Darwin configuration
        run: ./scripts/bootstrap.sh

      - name: Check all flake outputs
        run: nix flake check --impure --no-update-lock-file

      - name: Prepare the CI signing key
        if: >-
          github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          NIX_CACHE_PRIVATE_KEY: ${{ secrets.NIX_CACHE_CI_PRIVATE_KEY }}
        run: |
          private_key="${RUNNER_TEMP}/nix-cache-ci-private-key"

          umask 077
          printf '%s\n' "${NIX_CACHE_PRIVATE_KEY}" >"${private_key}"
          printf 'NIX_CACHE_PRIVATE_KEY_FILE=%s\n' "${private_key}" >>"${GITHUB_ENV}"

      - name: Sign and upload the Darwin closure
        if: >-
          github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          R2_CACHE_BUCKET: ${{ vars.R2_CACHE_BUCKET }}
          DOTFILES_DIR: ${{ github.workspace }}
        run: nix run path:.#cache-push

  ubuntu-wsl:
    name: Ubuntu WSL
    runs-on: windows-2025

    steps:
      - name: Install Ubuntu on WSL
        uses: Ubuntu/WSL/.github/actions/wsl-install@main
        with:
          distro: Ubuntu-24.04

      - name: Check out repository in WSL
        uses: Ubuntu/WSL/.github/actions/wsl-checkout@main
        with:
          distro: Ubuntu-24.04
          working-dir: /tmp/dotfiles
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and check the WSL configuration
        uses: Ubuntu/WSL/.github/actions/wsl-bash@main
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          R2_CACHE_BUCKET: ${{ vars.R2_CACHE_BUCKET }}
          NIX_CACHE_LOCAL_PUBLIC_KEY: ${{ vars.NIX_CACHE_LOCAL_PUBLIC_KEY }}
          NIX_CACHE_CI_PUBLIC_KEY: ${{ vars.NIX_CACHE_CI_PUBLIC_KEY }}
          WSLENV: R2_ACCESS_KEY_ID/u:R2_SECRET_ACCESS_KEY/u:CLOUDFLARE_ACCOUNT_ID/u:R2_CACHE_BUCKET/u:NIX_CACHE_LOCAL_PUBLIC_KEY/u:NIX_CACHE_CI_PUBLIC_KEY/u
        with:
          distro: Ubuntu-24.04
          working-dir: /tmp/dotfiles
          exec: |
            eval "$(RUNNER_TEMP=/tmp ./scripts/configure-r2-cache.sh)"

            GITHUB_ACTIONS=true ./scripts/bootstrap.sh
            nix flake check --impure --no-update-lock-file
