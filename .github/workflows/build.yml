# yaml-language-server: $schema=https://schemastore.org/github-workflow.json

name: Build

on:
  pull_request:

  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  darwin:
    name: macOS
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare the Nix cache
        env:
          DOTFILES_DIR: ${{ github.workspace }}
          DOTFILES_HOST: macbook-pro
          R2_ACCESS_KEY_ID: ${{ github.event_name != 'pull_request' && secrets.R2_ACCESS_KEY_ID || '' }}
          R2_SECRET_ACCESS_KEY: ${{ github.event_name != 'pull_request' && secrets.R2_SECRET_ACCESS_KEY || '' }}
        run: ./scripts/steps/085-prepare-nix-cache.sh

      - name: Rekey secrets for evaluation
        env:
          DOTFILES_DIR: ${{ github.workspace }}
        run: ./scripts/steps/080-rekey-secrets.sh

      - name: Build the Darwin configuration
        env:
          DOTFILES_DIR: ${{ github.workspace }}
          DOTFILES_HOST: macbook-pro
          DOTFILES_USER: k0ch4nx
        run: ./scripts/steps/090-build-nix-configuration.sh

      - name: Check all flake outputs
        run: nix flake check --impure --no-update-lock-file --accept-flake-config

      - name: Prepare the CI signing key
        if: >-
          github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          NIX_CACHE_PRIVATE_KEY: ${{ secrets.NIX_CACHE_CI_PRIVATE_KEY }}
        run: |
          private_key="${RUNNER_TEMP}/nix-cache-ci-private-key"

          umask 077
          printf '%s\n' "${NIX_CACHE_PRIVATE_KEY}" >"${private_key}"
          printf 'NIX_CACHE_PRIVATE_KEY_FILE=%s\n' "${private_key}" >>"${GITHUB_ENV}"

      - name: Sign and upload the Darwin closure
        if: >-
          github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          R2_CACHE_BUCKET: ${{ vars.R2_CACHE_BUCKET }}
          DOTFILES_DIR: ${{ github.workspace }}
        run: ./scripts/steps/120-push-nix-cache.sh

  ubuntu-wsl:
    name: Ubuntu WSL
    runs-on: windows-2025

    steps:
      - name: Install Ubuntu on WSL
        shell: powershell
        run: |
          winget install --id Microsoft.WSL --exact --source winget --accept-source-agreements --accept-package-agreements --silent --verbose
          # Installing an already-current WSL package may return nonzero; the commands below verify it directly.

          $env:WSL_UTF8 = 1
          wsl.exe --install Ubuntu-24.04 --web-download --no-launch
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          wsl.exe --distribution Ubuntu-24.04 -- echo Created a new distro with user: '$(whoami)'
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Check out repository in WSL
        uses: Ubuntu/WSL/.github/actions/wsl-checkout@f861f1083e518354e4c3637b08c0edfcf8bc3d51
        with:
          distro: Ubuntu-24.04
          working-dir: /tmp/dotfiles
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and check the WSL configuration
        uses: Ubuntu/WSL/.github/actions/wsl-bash@f861f1083e518354e4c3637b08c0edfcf8bc3d51
        env:
          R2_ACCESS_KEY_ID: ${{ github.event_name != 'pull_request' && secrets.R2_ACCESS_KEY_ID || '' }}
          R2_SECRET_ACCESS_KEY: ${{ github.event_name != 'pull_request' && secrets.R2_SECRET_ACCESS_KEY || '' }}
          WSLENV: R2_ACCESS_KEY_ID/u:R2_SECRET_ACCESS_KEY/u
        with:
          distro: Ubuntu-24.04
          working-dir: /tmp/dotfiles
          exec: |
            set -euo pipefail

            GITHUB_ACTIONS=true \
              DOTFILES_HOST=ubuntu-wsl \
              ./scripts/steps/020-install-nix.sh
            source /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh

            GITHUB_ACTIONS=true \
              DOTFILES_DIR=/tmp/dotfiles \
              DOTFILES_HOST=ubuntu-wsl \
              ./scripts/steps/085-prepare-nix-cache.sh

            GITHUB_ACTIONS=true \
              DOTFILES_DIR=/tmp/dotfiles \
              ./scripts/steps/080-rekey-secrets.sh

            GITHUB_ACTIONS=true \
              DOTFILES_DIR=/tmp/dotfiles \
              DOTFILES_HOST=ubuntu-wsl \
              DOTFILES_USER=k0ch4nx \
              ./scripts/steps/090-build-nix-configuration.sh

            nix flake check --impure --no-update-lock-file --accept-flake-config

      - name: Sign and upload the WSL closure
        if: >-
          github.ref == 'refs/heads/main' &&
          (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        uses: Ubuntu/WSL/.github/actions/wsl-bash@f861f1083e518354e4c3637b08c0edfcf8bc3d51
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          R2_CACHE_BUCKET: ${{ vars.R2_CACHE_BUCKET }}
          NIX_CACHE_PRIVATE_KEY: ${{ secrets.NIX_CACHE_CI_PRIVATE_KEY }}
          WSLENV: R2_ACCESS_KEY_ID/u:R2_SECRET_ACCESS_KEY/u:CLOUDFLARE_ACCOUNT_ID/u:R2_CACHE_BUCKET/u:NIX_CACHE_PRIVATE_KEY/u
        with:
          distro: Ubuntu-24.04
          working-dir: /tmp/dotfiles
          exec: |
            set -euo pipefail

            source /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh

            umask 077
            private_key="$(mktemp /tmp/nix-cache-ci-private-key.XXXXXX)"
            trap 'rm -f "${private_key}"' EXIT
            printf '%s\n' "${NIX_CACHE_PRIVATE_KEY}" >"${private_key}"
            unset NIX_CACHE_PRIVATE_KEY

            GITHUB_ACTIONS=true \
              NIX_CACHE_PRIVATE_KEY_FILE="${private_key}" \
              DOTFILES_DIR=/tmp/dotfiles \
              ./scripts/steps/120-push-nix-cache.sh
