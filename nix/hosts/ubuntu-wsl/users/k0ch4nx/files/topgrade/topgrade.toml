[misc]
no_retry = true
only = [
  "custom_commands",
  "system",
]

[commands]
"Nix - update flake inputs" = "cd $HOME/Developer/github.com/k0ch4nx/dotfiles && nix flake update"
"Home Manager - switch" = '''
set -euo pipefail
cd "$HOME/Developer/github.com/k0ch4nx/dotfiles"
ACTIVATION=$(nix build --no-link --print-out-paths '.#homeConfigurations."k0ch4nx@ubuntu-wsl".activationPackage')
"$ACTIVATION/activate"
'''
"Neovim - lazy.nvim" = '''
nvim --headless -c 'lua local ok, err = pcall(vim.cmd, "Lazy! sync"); if not ok then print(err); vim.cmd("cquit") else vim.cmd("qa") end'
'''
"Neovim - Treesitter" = '''
nvim --headless -c 'lua local ok = require("nvim-treesitter").install("all"):wait(); if not ok then print("nvim-treesitter install failed"); vim.cmd("cquit") else vim.cmd("qa") end'
nvim --headless -c 'lua local ok = require("nvim-treesitter").update():wait(); if not ok then print("nvim-treesitter update failed"); vim.cmd("cquit") else vim.cmd("qa") end'
'''
"Neovim - Mason" = '''
nvim --headless -c 'lua local ok, err = pcall(vim.cmd, "MasonInstallAll"); if not ok then print(err); vim.cmd("cquit") else vim.cmd("MasonLock"); vim.cmd("qa") end'
'''
"Neovim - codediff.nvim" = '''
nvim --headless -c 'lua local ok, err = pcall(require("codediff.core.installer").install); if not ok then print(err); vim.cmd("cquit") else vim.cmd("qa") end'
'''
